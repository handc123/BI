<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试血缘图谱API</title>
</head>
<body>
    <h1>测试血缘图谱API</h1>
    <button onclick="testAPI()">点击测试API</button>
    <pre id="result"></pre>

    <script>
        const BASE_URL = 'http://localhost:8080';

        async function testAPI() {
            const token = localStorage.getItem('Admin-Token') || 'your-token-here';
            const metricId = 6;

            try {
                // 测试获取指标血缘图谱
                const response = await fetch(`${BASE_URL}/bi/lineage/metric/${metricId}?mode=graph`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                document.getElementById('result').textContent = JSON.stringify(result, null, 2);

                console.log('API返回结果:', result);

                if (result.code === 200) {
                    alert('API调用成功！\n节点数: ' + (result.data.nodes?.length || 0) + '\n边数: ' + (result.data.edges?.length || 0));
                } else {
                    alert('API调用失败: ' + result.msg);
                }
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('API调用错误:', error);
            }
        }
    </script>
</body>
</html>
